services:
  nginx:
    image: nginx
    container_name: web02
    ports:
      - "8002:80"

  mysql:
    image: mysql
    environment:
      MYSQL_DATABASE: db02
      MYSQL_USER: user1
      MYSQL_PASSWORD: userpass987
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadn:
    image: phpmyadmin
    ports:
      - "8003:80"
    environment:
      PMA_HOST: db02

volumes:
  dbdata:

